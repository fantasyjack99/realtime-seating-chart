version: '3.8'

services:
  seat-management-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seat-management-app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - seat-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000

volumes:
  seat-data:
