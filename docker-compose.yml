version: '3.8'

services:
  seat-map-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seat-map-app
    restart: unless-stopped
    ports:
      # 將主機的 3000 port 映射到容器內的 3000 port
      # 如果您的 Synology NAS 上 3000 port 已被佔用，可以修改冒號前面的數字，例如 '8080:3000'
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # 使用 Docker Named Volume，由 Docker 自動管理儲存位置，避免路徑不存在的問題
      - seat-map-data:/app/data
    networks:
      - seat-map-network

networks:
  seat-map-network:
    name: seat-map-network
    driver: bridge

volumes:
  seat-map-data:
    name: seat-map-data
